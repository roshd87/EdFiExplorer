<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEDM Schema Explorer — Ed-Fi Special Education Data Model</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>

  <style>
    :root {
      /* Dark theme — high contrast for legibility */
      --bg-page: #0B1220;
      --bg-card: #111A2E;
      --bg-card-2: #162039;
      --bg-chip: #1E293B;
      --bg-chip-hover: #334155;
      --bg-graph: #0E1729;
      --text-primary: #F1F5F9;
      --text-secondary: #CBD5E1;
      --text-muted: #94A3B8;
      --text-inverse: #0F172A;
      --border-hairline: #1F2A44;
      --border-strong: #334155;
      --hub: #2DD4BF;             /* teal-400, AA on dark */
      --hub-soft: rgba(45,212,191,0.14);
      --hub-border: rgba(45,212,191,0.45);
      --resource: #60A5FA;        /* blue-400 */
      --resource-soft: rgba(96,165,250,0.14);
      --resource-border: rgba(96,165,250,0.45);
      --event: #FBBF24;           /* amber-400 */
      --event-soft: rgba(251,191,36,0.14);
      --event-border: rgba(251,191,36,0.45);
      --external: #94A3B8;
      --external-soft: rgba(148,163,184,0.16);
      --focus: #93C5FD;           /* blue-300, clearly visible on dark */
      --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 6px 18px rgba(0,0,0,0.35);
      --shadow-hover: 0 2px 4px rgba(0,0,0,0.5), 0 10px 26px rgba(0,0,0,0.45);
      --radius-ctrl: 8px;
      --radius-card: 12px;
      --radius-pill: 999px;
      --ease: cubic-bezier(0.2, 0, 0, 1);
      --t-fast: 150ms;
      --t-base: 220ms;
      --t-slow: 280ms;
      --font-display: "Source Serif 4", Georgia, serif;
      --font-ui: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "Consolas", "Courier New", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-page);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    body { color-scheme: dark; }

    /* ====================== Header ====================== */
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-hairline);
      z-index: 5;
    }
    header h1 {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      line-height: 1.35;
      color: var(--text-primary);
    }
    header .subtitle {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 12px;
      color: var(--text-secondary);
      margin-left: 8px;
    }

    .btn {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-ctrl);
      padding: 8px 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 40px;
      transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
    }
    .btn:hover { background: var(--bg-chip); }
    .btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
    .btn .label-text { white-space: nowrap; }

    /* ====================== Main layout ====================== */
    main {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(420px, 1fr);
      gap: 16px;
      padding: 16px 20px 20px;
      min-height: 0;
      overflow: hidden;
    }

    #cy-wrap {
      background: var(--bg-graph);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    #cy {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #cy:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: -2px;
    }

    .legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(17,26,46,0.92);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius-ctrl);
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      backdrop-filter: blur(6px);
      pointer-events: none;
      max-width: 280px;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }
    .legend-line { width: 22px; height: 0; flex: none; border-top: 2px solid; }
    .legend-line.dashed { border-top-style: dashed; }
    .legend-line.thin { border-top-width: 1px; }

    /* ====================== Inspector (bento) ====================== */
    #inspector {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-right: 4px;
      min-height: 0;
    }
    #inspector::-webkit-scrollbar { width: 8px; }
    #inspector::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    .bento {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 16px;
    }
    .card-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin: 0;
    }
    .card-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .header-card .name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 4px;
      line-height: 1.25;
      word-break: break-word;
    }
    .header-card .path {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-all;
    }
    .header-card .pill-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
    }
    .pill.hub { background: var(--hub-soft); color: var(--hub); }
    .pill.resource { background: var(--resource-soft); color: var(--resource); }
    .pill.event { background: var(--event-soft); color: var(--event); }
    .pill.external { background: var(--external-soft); color: var(--external); }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      min-height: 28px;
      border-radius: var(--radius-pill);
      background: var(--bg-chip);
      border: 1px solid var(--border-hairline);
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .chip svg { color: var(--text-muted); flex: none; }
    .chip.identity {
      background: var(--hub-soft);
      border-color: var(--hub-border);
      color: var(--hub);
    }
    .chip.identity svg { color: var(--hub); }
    .chip.required {
      background: var(--resource-soft);
      border-color: var(--resource-border);
      color: var(--resource);
    }
    .chip.required svg { color: var(--resource); }

    button.chip {
      cursor: pointer;
      transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
    }
    button.chip:hover {
      background: var(--bg-chip-hover);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-card);
    }
    button.chip:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
    button.chip.ref {
      background: var(--bg-card-2);
      border-color: var(--border-strong);
      color: var(--text-primary);
    }
    button.chip.ref .ref-target {
      color: var(--resource);
      font-weight: 600;
    }
    button.chip.ref svg.arrow { color: var(--text-muted); }

    table.props {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.props thead th {
      position: sticky;
      top: 0;
      background: var(--bg-card);
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-secondary);
      padding: 8px 8px;
      border-bottom: 1px solid var(--border-hairline);
      z-index: 1;
    }
    table.props tbody td {
      padding: 8px;
      border-bottom: 1px solid var(--border-hairline);
      vertical-align: top;
      color: var(--text-primary);
    }
    table.props tbody tr:last-child td { border-bottom: none; }
    table.props tbody tr.identity td:first-child {
      border-left: 3px solid var(--hub);
      padding-left: 6px;
    }
    table.props .prop-name {
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: nowrap;
    }
    table.props .prop-type {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    table.props .prop-desc {
      color: var(--text-secondary);
      font-size: 12.5px;
      line-height: 1.4;
    }
    table.props .flag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-weight: 500;
      margin-right: 4px;
      vertical-align: middle;
    }
    table.props .flag.identity { background: var(--hub-soft); color: var(--hub); border: 1px solid var(--hub-border); }
    table.props .flag.required { background: var(--resource-soft); color: var(--resource); border: 1px solid var(--resource-border); }
    table.props .flag.nullable { background: var(--bg-chip); color: var(--text-secondary); border: 1px solid var(--border-hairline); }

    details.collection {
      border: 1px solid var(--border-hairline);
      border-radius: var(--radius-ctrl);
      background: var(--bg-card-2);
      margin-top: 8px;
      overflow: hidden;
    }
    details.collection > summary {
      cursor: pointer;
      list-style: none;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--text-primary);
      user-select: none;
      transition: background var(--t-fast) var(--ease);
    }
    details.collection > summary::-webkit-details-marker { display: none; }
    details.collection > summary:hover { background: var(--bg-chip); }
    details.collection > summary:focus-visible { outline: 2px solid var(--focus); outline-offset: -2px; }
    details.collection > summary .chevron {
      transition: transform var(--t-base) var(--ease);
      color: var(--text-muted);
      flex: none;
    }
    details.collection[open] > summary .chevron {
      transform: rotate(180deg);
    }
    details.collection > summary .col-name { font-weight: 500; }
    details.collection > summary .col-desc {
      font-family: var(--font-ui);
      color: var(--text-secondary);
      font-size: 11.5px;
      font-weight: 400;
      margin-left: auto;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .collection-body {
      padding: 4px 12px 12px 24px;
      border-top: 1px solid var(--border-hairline);
      border-left: 2px solid var(--border-hairline);
      margin-left: 16px;
    }
    .collection-body details.collection { margin-top: 6px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 48px 24px;
      text-align: center;
      color: var(--text-secondary);
    }
    .empty-state .icon { color: var(--text-muted); }
    .empty-state .heading {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .empty-state .sub { font-size: 13px; color: var(--text-secondary); max-width: 320px; }

    .meta-row {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .meta-row .meta-item { display: inline-flex; align-items: center; gap: 4px; }
    .meta-row .meta-item .meta-val {
      font-family: var(--font-mono);
      color: var(--text-primary);
      font-weight: 500;
    }

    /* ====================== Icon defs ====================== */
    .icon { width: 16px; height: 16px; stroke-width: 2; flex: none; }
    .icon-sm { width: 14px; height: 14px; }
    .icon-lg { width: 32px; height: 32px; stroke-width: 1.6; }

    /* ====================== Responsive ====================== */
    @media (min-width: 1440px) {
      main { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
      .bento { grid-template-columns: 1fr 1fr; }
      .bento .span-full { grid-column: 1 / -1; }
    }
    @media (min-width: 1920px) {
      main { grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr); }
    }
    @media (max-width: 1023px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(50vh, 1fr) auto;
        gap: 12px;
      }
      #inspector {
        max-height: 45vh;
        padding-right: 0;
      }
      .bento { grid-template-columns: 1fr 1fr; }
      .bento .span-full { grid-column: 1 / -1; }
    }
    @media (max-width: 767px) {
      header { padding: 10px 12px; grid-template-columns: 1fr auto; }
      header h1 { font-size: 15px; }
      header .subtitle { display: none; }
      .btn .label-text { display: none; }
      main { padding: 10px 12px 14px; grid-template-rows: minmax(50vh, 1fr) auto; }
      .bento { grid-template-columns: 1fr; }
      .legend { display: none; }
    }

    /* ====================== Reduced motion ====================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1 style="display:inline">SEDM Schema Explorer</h1>
      <span class="subtitle">Ed-Fi Special Education Data Model · 7 resources</span>
    </div>
    <button class="btn" id="resetView" aria-label="Reset view">
      <svg class="icon" aria-hidden="true"><use href="#i-refresh"/></svg>
      <span class="label-text">Reset view</span>
    </button>
  </header>

  <main>
    <div id="cy-wrap">
      <div id="cy" role="application" tabindex="0" aria-label="Resource graph. Use arrow keys to cycle nodes, Enter to inspect."></div>
      <div class="legend" aria-hidden="true">
        <div class="legend-row"><span class="legend-swatch" style="background:#2DD4BF"></span><span>studentIEP (hub)</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#60A5FA"></span><span>SEDM resource</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#FBBF24"></span><span>ideaEvent</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#334155;border:1px solid #64748B"></span><span>External Ed-Fi reference</span></div>
        <div class="legend-row"><span class="legend-line" style="color:#60A5FA"></span><span>required reference</span></div>
        <div class="legend-row"><span class="legend-line dashed" style="color:#60A5FA"></span><span>optional reference</span></div>
        <div class="legend-row"><span class="legend-line dashed" style="color:#FBBF24"></span><span>ideaEvents[ ] membership</span></div>
      </div>
    </div>
    <aside id="inspector" aria-live="polite" aria-label="Resource inspector"></aside>
  </main>

  <script>
    // ===========================================================================
    // SCHEMA — extracted verbatim from
    //   https://swaggerui.districts-2526-ds52.sc.startingblocks.org/greenwood50/metadata/data/v3/resources/swagger.json
    // (Ed-Fi Operational Data Store API v3, OpenAPI 3.0.1)
    // ===========================================================================
    const SCHEMA = {
      resources: {
        sedm_ideaEvent: {
          displayName: 'ideaEvent',
          role: 'event',
          path: '/sedm/ideaEvents',
          description: 'A record of an IDEA-related event for a student (e.g. evaluation, eligibility determination).',
          identity: ['ideaEventDescriptor', 'ideaEventID', 'educationOrganizationId (via educationOrganizationReference)', 'studentUniqueId (via studentReference)'],
          required: ['ideaEventDescriptor', 'ideaEventID', 'beginDate', 'endDate', 'educationOrganizationReference', 'studentReference'],
          references: [
            { name: 'educationOrganizationReference', target: 'edFi.educationOrganization', kind: 'reference-required' },
            { name: 'studentReference', target: 'edFi.student', kind: 'reference-required' }
          ],
          properties: {
            ideaEventDescriptor: { type: 'string', maxLength: 306, identity: true, required: true, description: 'The IDEA event recorded for the student.' },

    // ===========================================================================
    // Build Cytoscape elements from SCHEMA
    // ===========================================================================
    function buildElements(schema) {
      const nodes = [];
      const edges = [];

      // Resource nodes
      for (const [id, r] of Object.entries(schema.resources)) {
        nodes.push({
          data: {
            id,
            label: r.displayName,
            role: r.role
          }
        });
      }
      // External nodes
      for (const [id, r] of Object.entries(schema.external)) {
        nodes.push({
          data: {
            id,
            label: r.displayName,
            role: 'external'
          }
        });
      }

      // Edges from references
      for (const [id, r] of Object.entries(schema.resources)) {
        for (const ref of r.references) {
          edges.push({
            data: {
              id: `${id}__${ref.name}`,
              source: id,
              target: ref.target,
              label: ref.name,
              kind: ref.target.startsWith('edFi.') ? 'external-ref' : ref.kind
            }
          });
        }
        // Edges from child collections with kind === membership (always to ideaEvent)
        for (const child of r.children || []) {
          if (child.kind === 'membership' && child.target) {
            edges.push({
              data: {
                id: `${id}__${child.name}`,
                source: id,
                target: child.target,
                label: child.name,
                kind: 'membership'
              }
            });
          }
          // Edges from inner-collection items that contain a reference (e.g. staffReference)
          for (const f of child.fields || []) {
            if (f.type === 'reference' && f.target && f.target.startsWith('edFi.')) {
              edges.push({
                data: {
                  id: `${id}__${child.name}__${f.name}`,
                  source: id,
                  target: f.target,
                  label: `${child.name}.${f.name}`,
                  kind: 'external-ref'
                }
              });
            }
          }
        }
      }
      // De-dup edges by id (e.g., serviceDelivery.serviceProviders[].staffReference + prescription.staffs[].staffReference both → staff: keep both, distinct ids)
      return { nodes, edges };
    }

    // After initial layout, pin the hub near the center and re-run once so spokes settle around it.
    cy.ready(() => {
      const hub = cy.getElementById('sedm_studentIEP');

    // ===========================================================================
    // Inspector renderer
    // ===========================================================================
    const inspector = document.getElementById('inspector');

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function icon(id, cls = 'icon icon-sm') {
      return `<svg class="${cls}" aria-hidden="true"><use href="#${id}"/></svg>`;
    }

    function rolePill(role) {
      const map = {
        hub: { cls: 'hub', text: 'Hub (studentIEP)' },
        resource: { cls: 'resource', text: 'SEDM resource' },
        event: { cls: 'event', text: 'IDEA event' },
        external: { cls: 'external', text: 'External Ed-Fi ref' }
      };
      const m = map[role] || map.resource;
      return `<span class="pill ${m.cls}">${m.text}</span>`;
    }

    function fieldType(p) {
      let t = p.type;
      if (p.format) t += ` (${p.format})`;
      return t;
    }

    function renderFieldRow(name, p, isInner = false) {
      const flags = [];
      if (p.identity) flags.push('<span class="flag identity">identity</span>');
      if (p.required) flags.push('<span class="flag required">required</span>');
      if (p.nullable) flags.push('<span class="flag nullable">nullable</span>');
      const cls = p.identity ? 'identity' : '';
      const max = p.maxLength ? `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">max ${p.maxLength}</div>` : '';
      const desc = p.description ? escapeHtml(p.description) : '';
      return `<tr class="${cls}">
        <td class="prop-name">${escapeHtml(name)}</td>
        <td class="prop-type">${escapeHtml(fieldType(p))}${max}</td>
        <td>${flags.join(' ')}</td>
        <td class="prop-desc">${desc}</td>
      </tr>`;
    }

    function renderCollection(c, depth = 0) {
      const fieldsRows = (c.fields || []).map(f => {
        if (f.type === 'reference') {
          const desc = f.description ? escapeHtml(f.description) : `Reference to ${escapeHtml(f.target)}`;
          const flags = (f.required ? '<span class="flag required">required</span>' : '');
          return `<tr>
            <td class="prop-name">${escapeHtml(f.name)}</td>
            <td class="prop-type">→ ${escapeHtml(f.target)}</td>
            <td>${flags}</td>
            <td class="prop-desc">${desc}</td>
          </tr>`;
        }
        return renderFieldRow(f.name, f, true);
      }).join('');

      const nested = (c.children || []).map(cc => renderCollection(cc, depth + 1)).join('');

      const descAttr = c.description ? `<span class="col-desc" title="${escapeHtml(c.description)}">${escapeHtml(c.description)}</span>` : '';

      return `<details class="collection"${depth === 0 ? ' open' : ''}>
        <summary>
          ${icon('i-chev-down', 'icon icon-sm chevron')}
          <span class="col-name">${escapeHtml(c.name)}</span>
          ${descAttr}
        </summary>
        <div class="collection-body">
          ${fieldsRows ? `<table class="props">
            <thead><tr><th>Field</th><th>Type</th><th>Flags</th><th>Description</th></tr></thead>
            <tbody>${fieldsRows}</tbody>
          </table>` : ''}
          ${nested}
        </div>
      </details>`;
    }

    function renderInspector(nodeId) {
      const isExternal = !!SCHEMA.external[nodeId];
      const r = isExternal ? SCHEMA.external[nodeId] : SCHEMA.resources[nodeId];
      if (!r) { renderEmpty(); return; }

      // ---------- header card ----------
      const headerCard = `
        <div class="card header-card span-full">

          <div class="pill-row">

          </div>

        </div>`;

      // ---------- identity card ----------
      const identityCard = `
        <div class="card">
          <div class="card-head">
            <h3 class="card-title">Identity keys</h3>

            ${r.identity.map(k => `<span class="chip identity">${icon('i-key')} ${escapeHtml(k)}</span>`).join('')}
          </div>
        </div>`;

      // ---------- required card ----------
      const requiredCard = `
        <div class="card">
          <div class="card-head">
            <h3 class="card-title">Required fields</h3>
            <span class="card-count">${r.required.length}</span>
          </div>
          <div class="chip-row">
            ${r.required.map(k => `<span class="chip required">${icon('i-asterisk')} ${escapeHtml(k)}</span>`).join('')}
          </div>
        </div>`;

      // ---------- references card ----------
      const refsCard = r.references.length ? `
        <div class="card span-full">
          <div class="card-head">
            <h3 class="card-title">References</h3>
            <span class="card-count">${r.references.length}</span>
          </div>
          <div class="chip-row">
            ${r.references.map(ref => `<button class="chip ref" type="button" data-focus="${escapeHtml(ref.target)}" aria-label="Open ${escapeHtml(ref.target)}">
              <span>${escapeHtml(ref.name)}</span>
              ${icon('i-arrow-right', 'icon icon-sm arrow')}
              <span class="ref-target">${escapeHtml(ref.target)}</span>
              ${ref.kind === 'reference-optional' ? '<span class="flag nullable" style="margin-left:4px">optional</span>' : ''}
            </button>`).join('')}
          </div>
        </div>` : '';

      // ---------- properties card ----------
      const propEntries = Object.entries(r.properties || {});
      const propsCard = propEntries.length ? `
        <div class="card span-full">
          <div class="card-head">
            <h3 class="card-title">Properties</h3>
            <span class="card-count">${propEntries.length}</span>
          </div>
          <div style="max-height:380px;overflow:auto">
            <table class="props">
              <thead><tr><th>Name</th><th>Type</th><th>Flags</th><th>Description</th></tr></thead>
              <tbody>${propEntries.map(([n, p]) => renderFieldRow(n, p)).join('')}</tbody>
            </table>
          </div>
        </div>` : '';

      // ---------- child collections card ----------
      const childCard = (r.children && r.children.length) ? `
        <div class="card span-full">
          <div class="card-head">
            <h3 class="card-title">Child collections</h3>
            <span class="card-count">${r.children.length}</span>
          </div>
          ${r.children.map(c => renderCollection(c)).join('')}
        </div>` : '';

      inspector.innerHTML = `<div class="bento">
        ${headerCard}
        ${identityCard}
        ${requiredCard}
        ${refsCard}
        ${propsCard}
        ${childCard}
      </div>`;
      inspector.scrollTo({ top: 0, behavior: REDUCED_MOTION ? 'auto' : 'smooth' });

      // Wire up reference chip clicks
      inspector.querySelectorAll('button.chip.ref[data-focus]').forEach(btn => {
        btn.addEventListener('click', () => focusNode(btn.dataset.focus));
        btn.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            focusNode(btn.dataset.focus);
          }
        });
      });
    }

    function renderEmpty() {
      inspector.innerHTML = `<div class="card empty-state">
        ${icon('i-click', 'icon icon-lg')}
        <div class="heading">Click a node to inspect</div>
        <div class="sub">The graph shows 7 SEDM resources (purple hub, blue resources, amber events) plus 3 external Ed-Fi references. Click any node, then follow reference chips to walk the model.</div>
      </div>`;
    }

    // ===========================================================================
    // Focus / selection helpers
    // ===========================================================================
    function focusNode(id) {
      const node = cy.getElementById(id);
      if (node.empty()) return;
      cy.elements().unselect();
      node.select();
      applyFocusFade(node);
      cy.animate({
        center: { eles: node },
        zoom: Math.max(0.9, cy.zoom())
      }, {
        duration: REDUCED_MOTION ? 0 : 280,
        easing: 'ease-in-out-cubic'
      });
      renderInspector(id);
    }

    function applyFocusFade(node) {
      const neighborhood = node.closedNeighborhood();
      cy.elements().removeClass('hl').removeClass('faded');
      cy.elements().difference(neighborhood).addClass('faded');
      neighborhood.addClass('hl');
    }

    function clearFocus() {
      cy.elements().removeClass('hl').removeClass('faded');
      cy.elements().unselect();
    }

    // ===========================================================================
    // Cy events
    // ===========================================================================
    cy.on('tap', 'node', evt => {
      const node = evt.target;
      applyFocusFade(node);
      renderInspector(node.id());
    });
    cy.on('tap', evt => {
      if (evt.target === cy) {
        clearFocus();
        renderEmpty();
      }
    });
    cy.on('mouseover', 'node', evt => {
      const neighborhood = evt.target.closedNeighborhood();
      neighborhood.addClass('hl');
    });
    cy.on('mouseout', 'node', evt => {
      // Only remove hl from nodes/edges that aren't part of the currently-selected neighborhood
      const sel = cy.$('node:selected');
      const keep = sel.nonempty() ? sel.closedNeighborhood() : cy.collection();
      cy.elements().difference(keep).removeClass('hl');
    });

    // ===========================================================================
    // Reset
    // ===========================================================================
    document.getElementById('resetView').addEventListener('click', () => {
      clearFocus();
      cy.animate({ fit: { padding: 50 } }, { duration: REDUCED_MOTION ? 0 : 280 });
      renderEmpty();
    });

    // ===========================================================================
    // Keyboard nav on graph
    // ===========================================================================
    const cyEl = document.getElementById('cy');
    cyEl.addEventListener('keydown', e => {
      const sortedNodes = cy.nodes().sort((a, b) => a.id().localeCompare(b.id()));
      const arr = sortedNodes.toArray();
      const selected = cy.$('node:selected');
      let idx = selected.nonempty() ? arr.findIndex(n => n.id() === selected.id()) : -1;
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        e.preventDefault();
        idx = (idx + 1 + arr.length) % arr.length;
        focusNode(arr[idx].id());
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        e.preventDefault();
        idx = (idx - 1 + arr.length) % arr.length;
        focusNode(arr[idx].id());
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (selected.nonempty()) renderInspector(selected.id());
      } else if (e.key === 'Escape') {
        e.preventDefault();
        clearFocus();
        renderEmpty();
        document.getElementById('resetView').focus();
      }
    });

    // ===========================================================================
    // Initial state
    // ===========================================================================
    renderEmpty();
  </script>
</body>
</html>
